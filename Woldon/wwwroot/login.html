<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Woldon - Login</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background-color: #0f172a;
        }
        /* Custom transitions for smoother UI experience */
        .input-focus {
            @apply focus:outline-none focus:border-cyan-500 transition-colors;
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen text-slate-200">

    <div class="bg-slate-800 p-8 rounded-xl shadow-2xl w-full max-w-md border border-slate-700">

        <header class="mb-8">
            <h1 class="text-3xl font-bold text-center text-cyan-400 mb-2 tracking-tight">WOLDON</h1>
            <p class="text-center text-slate-400 text-sm">Authentication Required</p>
        </header>

        <form id="loginForm" class="space-y-6">
            <div class="form-group">
                <label class="block text-sm font-medium mb-2 ml-1">Username</label>
                <input type="text" id="username" required
                       class="w-full px-4 py-3 rounded-lg bg-slate-900 border border-slate-700 focus:outline-none focus:border-cyan-500 transition-colors">
            </div>

            <div class="form-group">
                <label class="block text-sm font-medium mb-2 ml-1">Password</label>
                <input type="password" id="password" required
                       class="w-full px-4 py-3 rounded-lg bg-slate-900 border border-slate-700 focus:outline-none focus:border-cyan-500 transition-colors">
            </div>

            <div class="pt-2">
                <button type="submit"
                        class="w-full py-3 px-4 bg-cyan-600 hover:bg-cyan-500 text-white font-bold rounded-lg transition-all transform active:scale-95 shadow-lg uppercase tracking-wider text-sm">
                    Sign In
                </button>
            </div>

            <p id="errorMessage" class="text-red-400 text-center text-sm font-semibold hidden">
                Invalid credentials. Please try again.
            </p>
        </form>
    </div>

    <script>
        /**
         * Authentication Handler
         * Manages login requests and session redirection
         */
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const errorMsg = document.getElementById('errorMessage');
            errorMsg.classList.add('hidden');

            const credentials = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(credentials)
                });

                if (response.ok) {
                    // Redirect to secure dashboard on success
                    window.location.href = '/index.html';
                } else {
                    // Show error feedback on 401/Unauthorized
                    errorMsg.classList.remove('hidden');
                }
            } catch (error) {
                console.error('Auth Request failed:', error);
                errorMsg.innerText = "Connection error. Please check backend.";
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
