<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Woldon - Home Lab Wake</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: 'Inter', sans-serif;
        }

        .card {
            background: #1e293b;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

            .card:hover {
                transform: translateY(-5px);
                background: #334155;
                box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.5);
                border-color: #3b82f6;
            }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-5xl mx-auto">
        <header class="mb-12 text-center">
            <h1 class="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-2">
                WOLDON
            </h1>
            <p class="text-gray-400 text-lg">Twoje centrum budzenia maszyn w sieci LAN</p>
        </header>

        <div id="device-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="col-span-full text-center py-20">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-blue-500 mb-4"></div>
                <p class="text-gray-500">Inicjalizacja połączenia z API...</p>
            </div>
        </div>
    </div>

    <script>
        async function loadDevices() {
            try {
                const res = await fetch('/api/wake/devices');
                if (!res.ok) throw new Error('Błąd pobierania danych');

                const devices = await res.json();
                const container = document.getElementById('device-container');
                container.innerHTML = '';

                if (devices.length === 0) {
                    container.innerHTML = '<p class="text-center col-span-full text-gray-500">Brak skonfigurowanych urządzeń w appsettings.json</p>';
                    return;
                }

                devices.forEach(device => {
                    const card = document.createElement('div');
                    card.className = 'card p-8 rounded-2xl border border-slate-800 flex flex-col justify-between';
                    card.innerHTML = `
                            <div>
                                <div class="w-12 h-12 bg-blue-500/10 rounded-lg flex items-center justify-center mb-4">
                                    <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="System-computer-icon-placeholder"></path>
                                        <path d="M9 17.25v1.007a3 3 0 01-.879 2.122L7.5 21h9l-.621-.621A3 3 0 0115 18.257V17.25m6-12V15a2.25 2.25 0 01-2.25 2.25H5.25A2.25 2.25 0 013 15V5.25m18 0A2.25 2.25 0 0018.75 3H5.25A2.25 2.25 0 003 5.25m18 0V12a2.25 2.25 0 01-2.25 2.25H5.25A2.25 2.25 0 013 12V5.25"></path>
                                    </svg>
                                </div>
                                <h2 class="text-2xl font-bold mb-1">${device.name}</h2>
                                <p class="text-xs text-blue-300 font-mono uppercase tracking-widest mb-6">${device.macAddress}</p>
                            </div>
                            <button onclick="wake('${device.macAddress}')" class="group relative w-full bg-blue-600 hover:bg-blue-500 text-white py-3 rounded-xl font-black transition-all overflow-hidden">
                                <span class="relative z-10">OBUDŹ MASZYNĘ</span>
                            </button>
                        `;
                    container.appendChild(card);
                });
            } catch (err) {
                document.getElementById('device-container').innerHTML = `<p class="text-red-400 text-center col-span-full">Błąd: ${err.message}</p>`;
            }
        }

        async function wake(mac) {
            try {
                const res = await fetch(`/api/wake/run/${mac}`, { method: 'POST' });
                const data = await res.json();

                if (data.success) {
                    alert('Sygnał Magic Packet wysłany pomyślnie!');
                } else {
                    alert('Błąd: ' + data.message);
                }
            } catch (err) {
                alert('Błąd połączenia z serwerem Woldon');
            }
        }

        loadDevices();
    </script>
</body>
</html>
